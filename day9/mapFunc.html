<!DOCTYPE html>

<script>
    const arr = [1,2,3,4];

    function map(callback) {

        const newArr = [];

        for(let i = 0; i < arr.length; i++) {
            const val = callback(arr[i], i, arr);
            newArr.push(val);
        }

        return newArr;

    }

    // 각 요소를 2배로 변환
    const doubled = map(function(item, index, array) {
        return item * 2;
    });
    console.log('2배:', doubled); // [2, 4, 6, 8]

    // 각 요소를 제곱으로 변환
    const squared = map((item) => item ** 2);
    console.log('제곱:', squared); // [1, 4, 9, 16]

    // 인덱스와 함께 문자열로 변환
    const withIndex = map((item, index) => `${index}: ${item}`);
    console.log('인덱스 포함:', withIndex); // ["0: 1", "1: 2", "2: 3", "3: 4"]

</script>
</html>
