<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" placeholder="합을 구할 숫자를 입력(10 ~ 100 사이)">
    <button type="button" onclick="sum();">더하기</button>
    <p>
        결과: <span id="result"></span>
    </p>
    <script>

        //sum 함수를 구현하시오
        function sum() {
            const input = document.querySelector('input[type="number"]');
            const n = Number(input.value);

            if (n < 10 || n > 100) {
                alert("10 ~ 100 사이의 숫자를 입력하세요.");
                return;
            }

            let total = 0;
            for (let i = 1; i <= n; i++) {
                total += i;
            }

            document.getElementById('result').textContent = total;
        }

    </script>
</body>
</html>
