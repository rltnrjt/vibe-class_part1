<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding: 0;
            margin: 0;
        }
        .container{
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-form{
            width: 400px;
            height: 350px;
            border: 1px solid black;
            border-radius: 5px;
        }
        
        .form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .title{
            text-align: center;
        }
        .loginbtn{
            width: 100;
            background-color: blue;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-form">
            <div class="form">
                <form>
                    <h2>로그인</h2>
                    <div>
                        <input type="text" placeholder="ID 입력 ">
                    </div>
                    <div>
                        <input type="password" placeholder="password 입력 ">
                    </div>
                    <div>
                        <button type="button" class="loginbtn">로그인</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
